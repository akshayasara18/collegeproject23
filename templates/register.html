<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>our project</title>
<style>
  
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f2f8ff;
      color: #222;
}


    .site-header {
     background: linear-gradient(-45deg, #4B0082, #6a0dad, #8A2BE2, #c77dff);

      color: #fff;
      padding: 1rem 2rem ;
     
    }
.site-header {
  
  color: #fff;
  padding: 1.5rem 2rem; 
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  flex-wrap: wrap;
}



header {
      background: linear-gradient(-45deg, #4B0082, #6a0dad, #8A2BE2, #c77dff);
      padding: 20px;
      
      text-align: center;
      position: relative;
    }
   h1 {
      margin: 0;
      font-size: 28px;
      color: #fefefe;
    }
    h2 {
      margin: 5px 0 0;
      font-size: 20px;
      color: #ede9e9;
    }
    h3 {
      margin: 5px 0 0;
      font-size: 16px;
      font-weight: normal;
      color: #ede9e9;
    }
    .menu-toggle {
  position: absolute;
  left: 20px;
  top: 40px; 
  font-size: 30px;
  cursor: pointer;
  user-select: none;
}




    .menu-toggle.hidden {
      display: none;
    }

    

    .side-nav {
      position: fixed;
      top: 0;
      left: -250px;
      width: 250px;
      height: 100%;
     background: linear-gradient(-45deg, #4B0082, #6a0dad, #8A2BE2, #c77dff);

      overflow-y: auto;
      transition: left 0.3s ease;
      padding-top: 20px;
      color: white;
    }

    .side-nav.open {
      left: 0;
    }

    .close-menu {
      font-size: 24px;
      text-align: right;
      padding: 10px 20px;
      cursor: pointer;
    }

    .nav-links {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .nav-links li {
      border-bottom: 1px solid #555555;
    }

    .nav-links a {
      display: block;
      color: white;
      text-decoration: none;
      padding: 1rem;
    }

    .nav-links a:hover {
      background-color: #4B0082;
    }
   
.main-content {
  padding: 2rem;
  max-width: 600px;
  margin: 0 auto;
  background-color: #f5f5f5;
  border-radius: 8px;
}

.form-title {
  text-align: center;
  color: #333;
  margin-bottom: 1.5rem;
}

.registration-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group label {
  margin-bottom: 0.5rem;
  font-weight: bold;
}

.form-group input {
  padding: 0.5rem;
  font-size: 1rem;
  border: 1px solid #ccc;
  border-radius: 4px;
}

button[type="submit"] {
  padding: 0.75rem;
  font-size: 1rem;
  background-color:#4B0082;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

button[type="submit"]:hover {
  background-color: #555;
}
 .logo{
  position: absolute;
  top: 10px;
  left: 490px;
  width: 90px;
  height: 90px;
  border-radius: 50%;
  
}
  img {
            max-width: 200px;
            margin-top: 10px;
            border: 1px solid #ccc;
            padding: 5px;
        }

/* ✅ Mobile Responsive Fix */
@media (max-width: 600px) {
  /* Header section */
  .site-header {
    flex-direction: column;
    text-align: center;
    padding: 1rem;
  }

  .logo {
    position: static;
    margin: 10px auto;
    display: block;
    width: 70px;
    height: 70px;
  }

  .header-content h1 {
    font-size: 22px;
  }

  .header-content h2 {
    font-size: 16px;
  }
}

</style>
</head>
<body>

  
<header class="site-header">
  <div class="header-content">
   
    <h1>Fatima College</h1>
    
   <img src="static/logo.png" class="logo"> <h2>Department of Computer Science</h2>
  <br>
   <h3>Student Attendance System</h3>
  </div>
    <div class="menu-toggle" id="menu-toggle">☰</div>
  </header>
  <nav class="side-nav" id="side-nav">
    <div class="close-menu" id="close-menu">✖</div>
    <ul class="nav-links">
         <li><a href="{{url_for('container')}}">Home </a></li>
  <li><a href="{{url_for('register')}}">Registration </a></li>
      <li><a href="{{url_for('attendance')}}">Mark  Attendance</a></li>
      <li><a href="{{url_for('index')}}">View Report</a></li>
         <li><a href="{{url_for('leave_report')}}">Leave Report</a></li>
      <li><a href="{{url_for('linegraph')}}">Line Graph</a></li>
      <li><a href="{{url_for('login1')}}">Logout</a></li>


      
    </ul>
  </nav>
  <main class="main-content">
  <h2 class="form-title">Student Registration Form</h2>
  <form class="registration-form" action="/submit" method="POST" enctype="multipart/form-data">

    <div class="form-group">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required placeholder="Enter your name" />
    </div>

    <div class="form-group">
      <label for="regno">Reg No:</label>
      <input type="text" id="regno" name="regno" required placeholder="Enter your  regno"/>
    </div>
    <div class="form-group">
  <label for="dept">Department:</label>
  <input type="text" id="dept" name="dept" required placeholder="Enter your department"/>
</div>

    <div class="form-group">
      <label for="year">Year:</label>
      <input type="text" id="year" name="year" required  placeholder="Enter your year"/>
    </div>

    <div class="form-group">
      <label for="blood">Blood Group:</label>
      <input type="text" id="blood" name="blood" required placeholder="Enter your blood group" />
    </div>

    <div class="form-group">
      <label for="phone">Phone Number:</label>
      <input type="tel" id="phone" name="phone" required placeholder="Enter your phone number"/>
    </div>

    <div class="form-group">
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required placeholder="Enter your email id"/>
    </div>

    <div class="form-group">
      <label for="city">City:</label>
      <input type="text" id="city" name="city" required placeholder="Enter your city"/>
    </div>
    <div class="form-group">
        <label>Upload Photo: <input type="file" name="image" id="imageInput" accept="image/*" required></label><br>
        <br><br>

        <img id="preview" src="#" alt="Image Preview" style="display: none;"><br><br>

        </div>

    <button type="submit">Submit</button>
  </form>
</main>
{% if message %}
  <p style="text-align: center; color: green;">{{ message }}</p>
{% endif %}

  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const sideNav = document.getElementById('side-nav');
    const closeMenu = document.getElementById('close-menu');

    menuToggle.addEventListener('click', () => {
      sideNav.classList.add('open');
      menuToggle.classList.add('hidden');
    });

    closeMenu.addEventListener('click', () => {
      sideNav.classList.remove('open');
      menuToggle.classList.remove('hidden'); 

    });
    
  

  
 
 
    const imageInput = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
   
    imageInput.addEventListener('change', function () {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            preview.style.display = "block";

            reader.addEventListener("load", function () {
                preview.setAttribute("src", this.result);
            });

            reader.readAsDataURL(file);
        } else {
            preview.style.display = "none";
        }
    });

    form.addEventListener('submit', function (e) {
        e.preventDefault(); // prevent actual submit if not needed

        alert("Registered Successfully!");

        // Reset form
        form.reset();

        // Reset image preview
        preview.setAttribute("src", "#");
        preview.style.display = "none";
    });


   


  </script>

</body>
</html>
