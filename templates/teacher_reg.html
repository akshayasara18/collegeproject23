    label { display: block; margin: 10px 0 5px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ccc; }
    button { width: 100%; padding: 10px; background: linear-gradient(-45deg, #4B0082, #6a0dad, #8A2BE2, #c77dff); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }

    .alert {
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 4px;
      font-weight: bold;
      text-align: center;
      transition: opacity 1s ease;
    }
    .alert.success { background-color: #d4edda; color: #155724; }
    .alert.error { background-color: #f8d7da; color: #721c24; }

    /* Flash popup at center */
    .flash-center {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 30px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 18px;
      color: white;
      text-align: center;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      transition: opacity 0.6s ease;
      animation: popup 0.5s ease;
    }
    .flash-center.success { background-color: #28a745; }
    .flash-center.error { background-color: #dc3545; }

    @keyframes popup {
      from { transform: translate(-50%, -60%) scale(0.8); opacity: 0; }
      to   { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }

/* --- Media Queries --- */

/* Tablets: max-width 768px */
@media (max-width: 768px) {
  .site-header {
    flex-direction: column;
    text-align: center;
    padding: 1rem;
  }

  .logo {
    position: static;
    width: 80px;
    height: 80px;

  }

  .header-text h1 {

  }

/* Mobile phones: max-width 480px */
@media (max-width: 480px) {

    height: 60px;
  }

  .header-text h1 {

  }

  }

  .main-content {
    max-width: 95%;
    padding: 0.8rem;
    margin: 5px auto;
  }

  label {
    font-size: 14px;
  }

<body>

<header class="site-header">

  <div class="header-text">
    <h1>Fatima College</h1>
      <img src="static/logo.png" class="logo" alt="College Logo">
    <h2>Department of Computer Science</h2>
    <br>
    <h3>Student Attendance System</h3>
  </div>
  <div class="menu-toggle" id="menu-toggle" style="cursor:pointer;">☰</div>
</header>

<nav class="side-nav" id="side-nav">
  <div class="close-menu" id="close-menu">✖</div>
  <ul class="nav-links">
       <li><a href="{{url_for('container1')}}">Home </a></li>
    <li><a href="{{url_for('stu_det')}}">Student Details</a></li>
    <li><a href="{{url_for('teacher_reg')}}">Teacher Registration</a></li>
    <li><a href="{{url_for('teacher_det')}}">Teacher Details</a></li>
    <li><a href="{{url_for('manage_attendance')}}">Manage Attendance</a></li>
    <li><a href="{{url_for('login1')}}">Logout</a></li>
  </ul>
</nav>
<main class="main-content">
  <h2 class="form-title">Register a Teacher</h2>

  {% if message %}
    <div class="alert {% if '✅' in message %}success{% else %}error{% endif %}">{{ message }}</div>
  {% endif %}

<form action="/teacher_reg" method="POST">

  <label for="teacher_id">Teacher ID</label>
  <input type="text" id="teacher_id" name="teacher_id" required>

  <label for="teacher_name">Teacher Name</label>
  <input type="text" id="teacher_name" name="teacher_name" required>

  <label for="gender">Gender</label>
  <select id="gender" name="gender" required>
    <option value="">-- Select Gender --</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
    <option value="Other">Other</option>
  </select>

  <label for="department">Department</label>
  <input type="text" id="department" name="department" required>

  <label for="email">Email</label>
  <input type="email" id="email" name="email" required>

  <label for="phone">Phone</label>
  <input type="tel" id="phone" name="phone" required>

  <label for="designation">Designation</label>
  <input type="text" id="designation" name="designation" required>

  <label for="address">Address</label>
  <input type="text" id="address" name="address" required>

  <button type="submit">Register Teacher</button>
</form>
</main>
<script>
  const menuToggle = document.getElementById('menu-toggle');
  const sideNav = document.getElementById('side-nav');
  const closeMenu = document.getElementById('close-menu');

  menuToggle.addEventListener('click', () => {
    sideNav.classList.add('open');
  });

  closeMenu.addEventListener('click', () => {
    sideNav.classList.remove('open');
  });
</script>
</body>
</html>
